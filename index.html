<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - FrontEnd Mentor</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main>
        <div class="container">

            <form id="contact-form">
                <h1>Contact Us</h1>

                <label for="firstname">First Name *</label>
                <input type="text" id="firstname" name="firstname">

                <div class="error-message"></div>

                <label for="lastname">Last Name *</label>
                <input type="text" id="lastname" name="lastname">

                <div class="error-message"></div>

                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email">

                <div class="error-message"></div>

                <fieldset>
                    <legend>Query Type *</legend>
                    <input type="radio" id="general_enquiry" name="query_type" value="general">
                    <label for="general_enquiry">General Enquiry</label>

                    <input type="radio" id="support_request" name="query_type" value="support">
                    <label for="support_request">Support Request</label>

                    <div class="error-message"></div>
                </fieldset>

                <label for="message">Message *</label>
                <textarea id="message" name="message"></textarea>

                <div class="error-message"></div>

                <div class="consent-field">
                    <input type="checkbox" id="consent" name="consent">
                    <label for="consent">I consent to being contacted by the team *</label>
                </div>

                <div class="error-message"></div>

                <button type="submit">Submit</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer">
            <p>Challenge by <a href="/" target="_blank">Frontend Mentor</a>. Coded by <a href="/">Milenna Feijó</a></p>
        </div>
    </footer>

</body>

</html>
